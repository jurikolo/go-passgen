name: Deploy

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  security-scan:
    name: Static Analysis & Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to GitHub Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Snyk to check for vulnerabilities (source code)
        id: snyk-code
        uses: snyk/actions/golang@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk-code.sarif --severity-threshold=high

      - name: Upload Snyk code results to GitHub Security tab
        if: always() && steps.snyk-code.outcome != 'skipped' && hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif

      - name: Build image locally for Dockerfile scan
        run: docker build -t go-passgen:scan .

      - name: Run Snyk to check Dockerfile for issues
        id: snyk-docker
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: go-passgen:scan
          file: Dockerfile
          args: --severity-threshold=high --sarif-file-output=snyk-docker.sarif

      - name: Upload Snyk Dockerfile results to GitHub Security tab
        if: always() && steps.snyk-docker.outcome != 'skipped' && hashFiles('snyk-docker.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-docker.sarif

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan # Run only after security scan completes
    permissions:
      contents: read
      packages: write
      security-events: write # Required to upload SARIF results to GitHub Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=go-passgen
            org.opencontainers.image.description=A password generator web application
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Podman compatibility: use OCI format instead of Docker format
          provenance: false
          outputs: type=image,oci-mediatypes=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Snyk container scan of the *pushed* image
      - name: Snyk container scan — main image
        id: snyk-container
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ github.repository }}:master
          file: Dockerfile
          args: --severity-threshold=high --sarif-file-output=snyk-container.sarif

      - name: Upload Snyk container scan results to GitHub Security tab
        if: always() && steps.snyk-container.outcome != 'skipped' && hashFiles('snyk-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-container.sarif

      # ── MCP Server ──────────────────────────────

      - name: Extract metadata for MCP server
        id: meta-mcp
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/passgen-mcp
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=passgen-mcp
            org.opencontainers.image.description=MCP server for passgen password generator
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta-mcp.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push MCP server Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./mcp-server
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          # Podman compatibility: use OCI format instead of Docker format
          provenance: false
          outputs: type=image,oci-mediatypes=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Snyk container scan — MCP server image
        id: snyk-mcp-container
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ github.repository }}/passgen-mcp:master
          file: ./mcp-server/Dockerfile
          args: --severity-threshold=high --sarif-file-output=snyk-mcp-container.sarif

      - name: Upload Snyk MCP container scan results to GitHub Security tab
        if: always() && steps.snyk-mcp-container.outcome != 'skipped' && hashFiles('snyk-mcp-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-mcp-container.sarif
