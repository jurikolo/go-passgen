name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install C compiler for race detector
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector and coverage
        run: CGO_ENABLED=1 go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Build app
        run: go build -o passgen .

      - name: Verify binary works
        run: |
          if [ -x ./passgen ]; then
            echo "Binary built successfully"
            ./passgen --version
          else
            echo "Error: Binary not found or not executable"
            exit 1
          fi

      - name: Test MCP server
        run: |
          cd mcp-server
          go vet ./...
          CGO_ENABLED=1 go test ./... -race -coverprofile=coverage-mcp.out
          if [ -f coverage-mcp.out ]; then
            mv coverage-mcp.out ../coverage-mcp.out
          fi

      - name: Build MCP server
        run: |
          cd mcp-server
          go build -o passgen-mcp .
          if [ -x ./passgen-mcp ]; then
            echo "MCP server binary built successfully"
            ./passgen-mcp --help 2>&1 | head -5 || true
          else
            echo "Error: MCP server binary not found or not executable"
            exit 1
          fi