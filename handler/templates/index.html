<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassGen - Secure Password Generator</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        body {
            margin: 0;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-top: 0;
            text-align: center;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #444;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .checkbox-label input {
            margin-right: 0.5rem;
        }
        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .button:hover {
            background: #5a67d8;
        }
        .button:active {
            transform: translateY(1px);
        }
        .results {
            margin-top: 2rem;
            background: #f7fafc;
            border-radius: 0.5rem;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .result-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2d3748;
        }
        .password-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .password-item {
            padding: 0.75rem;
            background: white;
            border: 1px solid #cbd5e0;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .copy-btn {
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 0.25rem;
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: #38a169;
        }
        .error {
            color: #e53e3e;
            background: #fed7d7;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            color: #718096;
            font-size: 0.875rem;
        }
        .health-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #c6f6d5;
            color: #22543d;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 PassGen</h1>
        <p class="subtitle">Generate secure passwords with custom options</p>
        
        <form id="generateForm">
            <div class="form-group">
                <label for="length">Password Length</label>
                <input type="number" id="length" name="length" min="8" max="128" value="16">
            </div>
            
            <div class="form-group">
                <label>Character Sets</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="uppercase" checked> Uppercase (A-Z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="lowercase" checked> Lowercase (a-z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="digits" checked> Digits (0-9)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="symbols" checked> Symbols (!@#$...)
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="count">Number of Passwords</label>
                <input type="number" id="count" name="count" min="1" max="100" value="1">
            </div>
            
            <button type="submit" class="button">Generate Passwords</button>
        </form>
        
        <div class="error" id="errorBox"></div>
        
        <div class="results" id="results" style="display: none;">
            <div class="result-title">Generated Passwords</div>
            <ul class="password-list" id="passwordList"></ul>
        </div>
        
        <div class="footer">
            <p>Server status: <span class="health-status" id="healthStatus">Checking...</span></p>
            <p>API: POST /api/generate | Health: GET /health</p>
        </div>
    </div>
    
    <script>
        // Check health on load
        fetch('/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('healthStatus').textContent = data.status;
                if (data.status === 'ok') {
                    document.getElementById('healthStatus').style.background = '#c6f6d5';
                    document.getElementById('healthStatus').style.color = '#22543d';
                }
            })
            .catch(() => {
                document.getElementById('healthStatus').textContent = 'offline';
                document.getElementById('healthStatus').style.background = '#fed7d7';
                document.getElementById('healthStatus').style.color = '#742a2a';
            });
        
        // Form submission
        document.getElementById('generateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const request = {
                length: parseInt(document.getElementById('length').value),
                uppercase: document.getElementById('uppercase').checked,
                lowercase: document.getElementById('lowercase').checked,
                digits: document.getElementById('digits').checked,
                symbols: document.getElementById('symbols').checked,
                count: parseInt(document.getElementById('count').value)
            };
            
            // Clear previous results and error
            document.getElementById('results').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                
                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error);
                }
                
                const data = await response.json();
                displayPasswords(data.passwords);
            } catch (err) {
                showError(err.message);
            }
        });
        
        function displayPasswords(passwords) {
            const list = document.getElementById('passwordList');
            list.innerHTML = '';
            
            passwords.forEach(pwd => {
                const li = document.createElement('li');
                li.className = 'password-item';
                
                const span = document.createElement('span');
                span.textContent = pwd;
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = 'Copy';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(pwd).then(() => {
                        copyBtn.textContent = 'Copied!';
                        setTimeout(() => copyBtn.textContent = 'Copy', 2000);
                    });
                };
                
                li.appendChild(span);
                li.appendChild(copyBtn);
                list.appendChild(li);
            });
            
            document.getElementById('results').style.display = 'block';
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = 'Error: ' + message;
            errorBox.style.display = 'block';
        }
    </script>
</body>
</html>
